name: Update Looker screenshots

on:
  workflow_dispatch:

concurrency:
  group: looker-screenshots
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  shots:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Sync to latest main
        run: |
          git fetch origin main --quiet
          git checkout main
          git reset --hard origin/main

      - name: Take screenshots
        run: npm run shots

      - name: Write last-updated marker
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > shots/last-updated.txt

      - name: Commit & push
        env:
          BRANCH: main
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add shots

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: update Looker screenshots [skip ci]"

          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${BRANCH}"; then
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi

            echo "Push failed (attempt ${attempt}/5). Fetching and rebasing..."
            git fetch origin "${BRANCH}" --quiet

            if ! git rebase "origin/${BRANCH}"; then
              git rebase --abort
              echo "Rebase conflict — giving up."
              exit 1
            fi

            sleep $((attempt * 2))
          done

          echo "Push failed after 5 attempts."
          exit 1
